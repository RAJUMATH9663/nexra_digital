<svg width="400" height="260" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260" role="img" aria-label="Landing Pages">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070d1a"/>
      <stop offset="100%" stop-color="#0d2137"/>
    </linearGradient>
    <pattern id="dots" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="1" fill="#ffffff" opacity="0.04"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="400" height="260" fill="url(#bg)"/>
  <rect width="400" height="260" fill="url(#dots)"/>
  <g filter="url(#glow)">
    <rect x="35" y="14" width="330" height="170" rx="13" fill="none" stroke="#448aff" stroke-width="2.5" opacity="0.9"/>
    <rect x="35" y="14" width="330" height="32" rx="13" fill="#448aff" opacity="0.2"/>
    <rect x="80" y="62" width="240" height="20" rx="5" fill="#448aff" opacity="0.45"/>
    <rect x="100" y="90" width="200" height="12" rx="3" fill="#82b1ff" opacity="0.28"/>
    <rect x="118" y="110" width="164" height="10" rx="3" fill="#82b1ff" opacity="0.22"/>
    <rect x="128" y="130" width="144" height="34" rx="14" fill="#448aff" opacity="0.65"/>
    <rect x="140" y="141" width="100" height="12" rx="3" fill="#fff" opacity="0.55"/></g>
</svg>