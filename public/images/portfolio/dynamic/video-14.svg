    <rect x="285" y="18" width="68" height="50" rx="6" fill="none" stroke="#b388ff" stroke-width="2" opacity="0.75"/>
    <rect x="285" y="18" width="68" height="15" rx="6" fill="#b388ff" opacity="0.2"/>
    <path d="M42,170 Q120,155 200,170 Q280,185 358,170" fill="none" stroke="#b388ff" stroke-width="2.5" opacity="0.55"/></g>
