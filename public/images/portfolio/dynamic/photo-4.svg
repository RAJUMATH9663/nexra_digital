    <circle cx="162" cy="106" r="26" fill="#64b5f6" opacity="0.16"/>
    <rect x="262" y="24" width="16" height="68" rx="6" fill="#90caf9" opacity="0.55"/>
    <circle cx="270" cy="18" r="14" fill="none" stroke="#90caf9" stroke-width="2" opacity="0.7"/>
