<svg width="400" height="260" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260" role="img" aria-label="Subtitles &amp; Captions">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0533"/>
      <stop offset="100%" stop-color="#3d0a6e"/>
    </linearGradient>
    <pattern id="dots" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="1" fill="#ffffff" opacity="0.04"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="400" height="260" fill="url(#bg)"/>
  <rect width="400" height="260" fill="url(#dots)"/>
  <g filter="url(#glow)">
    <rect x="40" y="20" width="320" height="152" rx="14" fill="none" stroke="#e040fb" stroke-width="2.5" opacity="0.85"/>
    <rect x="48" y="28" width="304" height="136" rx="9" fill="#e040fb" opacity="0.07"/>
    <line x1="200" y1="28" x2="200" y2="156" stroke="#b388ff" stroke-width="1" opacity="0.18" stroke-dasharray="5 5"/>
    <line x1="48" y1="96" x2="352" y2="96" stroke="#b388ff" stroke-width="1" opacity="0.18" stroke-dasharray="5 5"/>
    <rect x="62" y="148" width="276" height="22" rx="6" fill="#e040fb" opacity="0.3"/>
    <rect x="72" y="153" width="80" height="10" rx="3" fill="#fff" opacity="0.75"/>
    <rect x="162" y="153" width="55" height="10" rx="3" fill="#fff" opacity="0.75"/>
    <rect x="226" y="153" width="90" height="10" rx="3" fill="#fff" opacity="0.75"/></g>
</svg>