<svg width="400" height="260" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260" role="img" aria-label="Real Estate Photography">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1b2a"/>
      <stop offset="100%" stop-color="#1b3a5c"/>
    </linearGradient>
    <pattern id="dots" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="1" fill="#ffffff" opacity="0.04"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="400" height="260" fill="url(#bg)"/>
  <rect width="400" height="260" fill="url(#dots)"/>
  <g filter="url(#glow)">
    <polygon points="200,18 295,82 295,170 105,170 105,82" fill="none" stroke="#64b5f6" stroke-width="2.5" opacity="0.9"/>
    <polygon points="200,18 105,82 295,82" fill="#64b5f6" opacity="0.12"/>
    <rect x="175" y="120" width="50" height="50" rx="5" fill="none" stroke="#90caf9" stroke-width="2" opacity="0.75"/>
    <rect x="115" y="98" width="48" height="40" rx="6" fill="none" stroke="#90caf9" stroke-width="2" opacity="0.7"/>
    <rect x="237" y="98" width="48" height="40" rx="6" fill="none" stroke="#90caf9" stroke-width="2" opacity="0.7"/>
    <circle cx="340" cy="40" r="24" fill="none" stroke="#64b5f6" stroke-width="2" opacity="0.65"/>
    <circle cx="340" cy="40" r="12" fill="#64b5f6" opacity="0.22"/></g>
</svg>