<svg width="400" height="260" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260" role="img" aria-label="Thumbnail Design">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0533"/>
      <stop offset="100%" stop-color="#3d0a6e"/>
    </linearGradient>
    <pattern id="dots" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="1" fill="#ffffff" opacity="0.04"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="400" height="260" fill="url(#bg)"/>
  <rect width="400" height="260" fill="url(#dots)"/>
  <g filter="url(#glow)">
    <rect x="68" y="22" width="264" height="148" rx="12" fill="none" stroke="#e040fb" stroke-width="2.5" opacity="0.9"/>
    <rect x="75" y="29" width="250" height="134" rx="8" fill="#e040fb" opacity="0.1"/>
    <circle cx="200" cy="95" r="36" fill="#e040fb" opacity="0.2"/>
    <text x="185" y="110" font-family="sans-serif" font-size="34" fill="#e040fb" opacity="0.9">👁</text>
    <rect x="68" y="178" width="264" height="16" rx="5" fill="#b388ff" opacity="0.35"/>
    <rect x="76" y="181" width="140" height="9" rx="3" fill="#fff" opacity="0.65"/>
    <circle cx="92" cy="39" r="5" fill="#b388ff" opacity="0.55"/><circle cx="308" cy="39" r="5" fill="#e040fb" opacity="0.55"/></g>
</svg>