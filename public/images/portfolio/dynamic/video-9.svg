<svg width="400" height="260" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260" role="img" aria-label="Travel Vlogs">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0533"/>
      <stop offset="100%" stop-color="#3d0a6e"/>
    </linearGradient>
    <pattern id="dots" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="1" fill="#ffffff" opacity="0.04"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="400" height="260" fill="url(#bg)"/>
  <rect width="400" height="260" fill="url(#dots)"/>
  <g filter="url(#glow)">
    <circle cx="200" cy="90" r="78" fill="none" stroke="#e040fb" stroke-width="2.5" opacity="0.85"/>
    <ellipse cx="200" cy="90" rx="38" ry="78" fill="none" stroke="#b388ff" stroke-width="1.5" opacity="0.5"/>
    <line x1="122" y1="90" x2="278" y2="90" stroke="#b388ff" stroke-width="1.5" opacity="0.45"/>
    <line x1="130" y1="54" x2="270" y2="54" stroke="#b388ff" stroke-width="1" opacity="0.3"/>
    <line x1="130" y1="126" x2="270" y2="126" stroke="#b388ff" stroke-width="1" opacity="0.3"/>
    <text x="210" y="78" font-family="sans-serif" font-size="32" fill="#e040fb" opacity="0.95">✈</text></g>
</svg>