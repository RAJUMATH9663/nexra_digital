<svg width="400" height="260" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260" role="img" aria-label="Promotional Videos">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0533"/>
      <stop offset="100%" stop-color="#3d0a6e"/>
    </linearGradient>
    <linearGradient id="megGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e040fb"/>
      <stop offset="100%" stop-color="#b388ff"/>
    </linearGradient>
    <pattern id="dots" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="1" fill="#ffffff" opacity="0.04"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="400" height="260" fill="url(#bg)"/>
  <rect width="400" height="260" fill="url(#dots)"/>

  <g filter="url(#glow)">
    <!-- ── Megaphone body ── -->
    <!-- Mouthpiece (wide end, right) -->
    <polygon points="248,54 248,176 148,136 148,94" fill="url(#megGrad)" opacity="0.85"/>
    <!-- Handle/speaker (small end, left) -->
    <rect x="80" y="103" width="70" height="54" rx="8" fill="#e040fb" opacity="0.7"/>
    <!-- Bell flare on the right -->
    <ellipse cx="248" cy="115" rx="18" ry="62" fill="#b388ff" opacity="0.25"/>
    <ellipse cx="248" cy="115" rx="18" ry="62" fill="none" stroke="#e040fb" stroke-width="2.5" opacity="0.8"/>

    <!-- Cord hanging below handle -->
    <path d="M115,157 Q115,185 100,195 Q90,200 90,215" fill="none" stroke="#e040fb" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
    <circle cx="90" cy="218" r="7" fill="#e040fb" opacity="0.6"/>

    <!-- ── Sound waves radiating right ── -->
    <path d="M268,82 Q310,115 268,148" fill="none" stroke="#e040fb" stroke-width="3.5" stroke-linecap="round" opacity="0.9"/>
    <path d="M278,62 Q340,115 278,168" fill="none" stroke="#b388ff" stroke-width="2.5" stroke-linecap="round" opacity="0.75"/>
    <path d="M288,44 Q368,115 288,186" fill="none" stroke="#e040fb" stroke-width="2" stroke-linecap="round" opacity="0.5"/>

    <!-- ── Play button on the megaphone face ── -->
    <circle cx="192" cy="115" r="28" fill="#e040fb" opacity="0.25"/>
    <circle cx="192" cy="115" r="28" fill="none" stroke="#ffffff" stroke-width="2.5" opacity="0.7"/>
    <polygon points="184,103 184,128 210,115" fill="#ffffff" opacity="0.9"/>

    <!-- ── Decorative stars / sparkles ── -->
    <circle cx="58"  cy="60"  r="4" fill="#e040fb" opacity="0.7"/>
    <circle cx="350" cy="40"  r="3" fill="#b388ff" opacity="0.6"/>
    <circle cx="58"  cy="175" r="3" fill="#b388ff" opacity="0.5"/>
    <circle cx="340" cy="200" r="4" fill="#e040fb" opacity="0.55"/>
    <!-- sparkle lines top-left -->
    <line x1="52" y1="45" x2="52" y2="35" stroke="#e040fb" stroke-width="1.5" opacity="0.6"/>
    <line x1="47" y1="50" x2="38" y2="50" stroke="#e040fb" stroke-width="1.5" opacity="0.6"/>
    <line x1="49" y1="47" x2="43" y2="41" stroke="#e040fb" stroke-width="1.5" opacity="0.5"/>
    <!-- sparkle lines top-right -->
    <line x1="350" y1="28" x2="350" y2="20" stroke="#b388ff" stroke-width="1.5" opacity="0.55"/>
    <line x1="345" y1="33" x2="337" y2="33" stroke="#b388ff" stroke-width="1.5" opacity="0.55"/>
  </g>
</svg>