<svg width="400" height="260" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260" role="img" aria-label="Instagram Reels">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0533"/>
      <stop offset="100%" stop-color="#3d0a6e"/>
    </linearGradient>
    <pattern id="dots" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="1" fill="#ffffff" opacity="0.04"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="400" height="260" fill="url(#bg)"/>
  <rect width="400" height="260" fill="url(#dots)"/>
  <g filter="url(#glow)">
    <rect x="148" y="8" width="104" height="162" rx="20" fill="none" stroke="#e040fb" stroke-width="3" opacity="0.95"/>
    <rect x="157" y="18" width="86" height="142" rx="12" fill="#e040fb" opacity="0.12"/>
    <circle cx="200" cy="6" r="5" fill="#e040fb" opacity="0.6"/>
    <circle cx="200" cy="98" r="36" fill="none" stroke="#e040fb" stroke-width="2.5" opacity="0.85"/>
    <circle cx="200" cy="98" r="20" fill="#e040fb" opacity="0.22"/>
    <polygon points="191,86 191,111 218,98" fill="#e040fb" opacity="1"/>
    <line x1="159" y1="60" x2="159" y2="136" stroke="#b388ff" stroke-width="1.5" opacity="0.4"/>
    <line x1="241" y1="60" x2="241" y2="136" stroke="#b388ff" stroke-width="1.5" opacity="0.4"/>
    <circle cx="90" cy="35" r="3" fill="#b388ff" opacity="0.7"/><circle cx="310" cy="55" r="3" fill="#e040fb" opacity="0.7"/>
    <circle cx="70" cy="130" r="4" fill="#b388ff" opacity="0.5"/></g>
</svg>