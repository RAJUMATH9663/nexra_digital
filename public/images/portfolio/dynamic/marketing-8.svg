<svg width="400" height="260" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260" role="img" aria-label="Marketing Strategy">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#051f1b"/>
      <stop offset="100%" stop-color="#0a3d35"/>
    </linearGradient>
    <pattern id="dots" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="1" fill="#ffffff" opacity="0.04"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="400" height="260" fill="url(#bg)"/>
  <rect width="400" height="260" fill="url(#dots)"/>
  <g filter="url(#glow)">
    <rect x="42" y="22" width="200" height="160" rx="9" fill="none" stroke="#00e676" stroke-width="2.5" opacity="0.9"/>
    
      <line x1="92" y1="22" x2="92" y2="182" stroke="#69f0ae" stroke-width="1.2" opacity="0.28"/>
      <line x1="42" y1="62" x2="242" y2="62" stroke="#69f0ae" stroke-width="1.2" opacity="0.28"/>
    
      <line x1="142" y1="22" x2="142" y2="182" stroke="#69f0ae" stroke-width="1.2" opacity="0.28"/>
      <line x1="42" y1="102" x2="242" y2="102" stroke="#69f0ae" stroke-width="1.2" opacity="0.28"/>
    
      <line x1="192" y1="22" x2="192" y2="182" stroke="#69f0ae" stroke-width="1.2" opacity="0.28"/>
      <line x1="42" y1="142" x2="242" y2="142" stroke="#69f0ae" stroke-width="1.2" opacity="0.28"/>
    
    <circle cx="92"  cy="62" r="18" fill="#00e676" opacity="0.5"/>
    <circle cx="192" cy="102" r="18" fill="#69f0ae" opacity="0.5"/>
