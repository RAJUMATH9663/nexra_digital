<svg width="400" height="260" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260" role="img" aria-label="Product Photography">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1b2a"/>
      <stop offset="100%" stop-color="#1b3a5c"/>
    </linearGradient>
    <pattern id="dots" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="1" fill="#ffffff" opacity="0.04"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="400" height="260" fill="url(#bg)"/>
  <rect width="400" height="260" fill="url(#dots)"/>
  <g filter="url(#glow)">
    <rect x="95" y="40" width="200" height="130" rx="18" fill="none" stroke="#64b5f6" stroke-width="2.5" opacity="0.9"/>
    <rect x="150" y="20" width="100" height="28" rx="10" fill="none" stroke="#64b5f6" stroke-width="2" opacity="0.7"/>
    <circle cx="200" cy="105" r="50" fill="none" stroke="#64b5f6" stroke-width="2.5" opacity="0.8"/>
    <circle cx="200" cy="105" r="34" fill="#64b5f6" opacity="0.14"/>
    <circle cx="200" cy="105" r="20" fill="#64b5f6" opacity="0.22"/>
    <rect x="35" y="118" width="54" height="60" rx="5" fill="none" stroke="#90caf9" stroke-width="2" opacity="0.7"/>
    <polygon points="35,118 62,102 89,118" fill="#90caf9" opacity="0.22"/>
    <circle cx="290" cy="55" r="10" fill="#90caf9" opacity="0.7"/><circle cx="290" cy="55" r="17" fill="#90caf9" opacity="0.18"/></g>
</svg>