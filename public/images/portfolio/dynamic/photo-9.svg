<svg width="400" height="260" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260" role="img" aria-label="Promotional Shoots">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1b2a"/>
      <stop offset="100%" stop-color="#1b3a5c"/>
    </linearGradient>
    <pattern id="dots" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="1" fill="#ffffff" opacity="0.04"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="400" height="260" fill="url(#bg)"/>
  <rect width="400" height="260" fill="url(#dots)"/>
  <g filter="url(#glow)">
    <rect x="88" y="32" width="192" height="128" rx="16" fill="none" stroke="#64b5f6" stroke-width="2.5" opacity="0.9"/>
    <rect x="140" y="14" width="120" height="26" rx="9" fill="none" stroke="#64b5f6" stroke-width="2" opacity="0.75"/>
    <circle cx="184" cy="96" r="44" fill="none" stroke="#64b5f6" stroke-width="2" opacity="0.75"/>
    <circle cx="184" cy="96" r="28" fill="#64b5f6" opacity="0.16"/>
    <polygon points="248,30 240,62 256,60 242,96" fill="#90caf9" opacity="0.8"/>
    <path d="M38,172 Q200,155 362,172" fill="none" stroke="#90caf9" stroke-width="2.5" opacity="0.45"/></g>
</svg>