<svg width="400" height="260" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260" role="img" aria-label="Wedding &amp; Pre-Wedding Edits">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0533"/>
      <stop offset="100%" stop-color="#3d0a6e"/>
    </linearGradient>
    <pattern id="dots" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="1" fill="#ffffff" opacity="0.04"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="400" height="260" fill="url(#bg)"/>
  <rect width="400" height="260" fill="url(#dots)"/>
  <g filter="url(#glow)">
    <circle cx="168" cy="88" r="46" fill="none" stroke="#e040fb" stroke-width="3.5" opacity="0.9"/>
    <circle cx="232" cy="88" r="46" fill="none" stroke="#b388ff" stroke-width="3.5" opacity="0.9"/>
    <polygon points="200,22 222,48 200,68 178,48" fill="#e040fb" opacity="0.7"/>
    <polygon points="200,22 222,48 200,36" fill="#b388ff" opacity="0.45"/>
    <text x="70" y="58" font-family="sans-serif" font-size="26" fill="#e040fb" opacity="0.65">♥</text>
    <text x="318" y="138" font-family="sans-serif" font-size="22" fill="#b388ff" opacity="0.65">♥</text>
    <path d="M60,148 Q130,128 200,155 Q270,182 340,140" fill="none" stroke="#b388ff" stroke-width="2" opacity="0.45"/></g>
</svg>