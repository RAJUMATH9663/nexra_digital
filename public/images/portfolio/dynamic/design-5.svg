      <rect x="45" y="33" width="86" height="134" rx="4" fill="#00e5ff" opacity="0.04"/>
    
      <rect x="144" y="22" width="112" height="152" rx="7" fill="none" stroke="#00e5ff" stroke-width="2.5" opacity="0.9"/>
      <rect x="149" y="27" width="102" height="142" rx="4" fill="#00e5ff" opacity="0.04"/>
    
      <rect x="264" y="28" width="96" height="144" rx="7" fill="none" stroke="#80deea" stroke-width="1.8" opacity="0.55"/>
      <rect x="269" y="33" width="86" height="134" rx="4" fill="#00e5ff" opacity="0.04"/>
    
    <rect x="160" y="50" width="80" height="12" rx="3" fill="#00e5ff" opacity="0.35"/>
