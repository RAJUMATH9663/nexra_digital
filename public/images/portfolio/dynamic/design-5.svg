    <line x1="142" y1="22" x2="142" y2="174" stroke="#00e5ff" stroke-width="1.2" opacity="0.35" stroke-dasharray="5 5"/>
    <line x1="260" y1="22" x2="260" y2="174" stroke="#00e5ff" stroke-width="1.2" opacity="0.35" stroke-dasharray="5 5"/></g>
</svg>