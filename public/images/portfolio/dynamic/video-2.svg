<svg width="400" height="260" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260" role="img" aria-label="YouTube Videos">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0533"/>
      <stop offset="100%" stop-color="#3d0a6e"/>
    </linearGradient>
    <pattern id="dots" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="1" fill="#ffffff" opacity="0.04"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="400" height="260" fill="url(#bg)"/>
  <rect width="400" height="260" fill="url(#dots)"/>
  <g filter="url(#glow)">
    <rect x="55" y="18" width="290" height="148" rx="14" fill="none" stroke="#e040fb" stroke-width="2.5" opacity="0.9"/>
    <rect x="62" y="25" width="276" height="134" rx="9" fill="#e040fb" opacity="0.08"/>
    <circle cx="200" cy="92" r="44" fill="#e040fb" opacity="0.2"/>
    <polygon points="183,70 183,115 225,92" fill="#e040fb" opacity="1"/>
    <rect x="70" y="150" width="260" height="5" rx="2.5" fill="#b388ff" opacity="0.25"/>
    <rect x="70" y="150" width="130" height="5" rx="2.5" fill="#e040fb" opacity="0.9"/>
    <circle cx="80" cy="30" r="5" fill="#b388ff" opacity="0.5"/><circle cx="200" cy="30" r="5" fill="#e040fb" opacity="0.5"/>
    <circle cx="320" cy="30" r="5" fill="#b388ff" opacity="0.5"/></g>
</svg>