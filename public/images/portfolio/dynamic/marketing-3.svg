<svg width="400" height="260" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260" role="img" aria-label="Search Engine Optimization (SEO)">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#051f1b"/>
      <stop offset="100%" stop-color="#0a3d35"/>
    </linearGradient>
    <pattern id="dots" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="1" fill="#ffffff" opacity="0.04"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="400" height="260" fill="url(#bg)"/>
  <rect width="400" height="260" fill="url(#dots)"/>
  <g filter="url(#glow)">
    <circle cx="155" cy="92" r="72" fill="none" stroke="#00e676" stroke-width="2.5" opacity="0.9"/>
    <line x1="207" y1="144" x2="318" y2="202" stroke="#00e676" stroke-width="6" stroke-linecap="round" opacity="0.8"/>
    <rect x="102" y="132" width="13" height="4" rx="3" fill="#00e676" opacity="0.6"/><rect x="124" y="110" width="13" height="26" rx="3" fill="#00e676" opacity="0.6"/><rect x="146" y="88" width="13" height="48" rx="3" fill="#00e676" opacity="0.6"/><rect x="168" y="70" width="13" height="66" rx="3" fill="#00e676" opacity="0.6"/><rect x="190" y="92" width="13" height="44" rx="3" fill="#00e676" opacity="0.6"/>
    <circle cx="155" cy="55" r="22" fill="#69f0ae" opacity="0.32"/>
    <text x="148" y="63" font-family="sans-serif" font-size="18" fill="#69f0ae" opacity="0.95" font-weight="bold">#1</text></g>
</svg>