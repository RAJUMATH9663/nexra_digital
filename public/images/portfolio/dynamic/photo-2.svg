<svg width="400" height="260" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260" role="img" aria-label="Business Photography">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1b2a"/>
      <stop offset="100%" stop-color="#1b3a5c"/>
    </linearGradient>
    <pattern id="dots" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="1" fill="#ffffff" opacity="0.04"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="400" height="260" fill="url(#bg)"/>
  <rect width="400" height="260" fill="url(#dots)"/>
  <g filter="url(#glow)">
    <rect x="108" y="38" width="174" height="120" rx="16" fill="none" stroke="#64b5f6" stroke-width="2.5" opacity="0.9"/>
    <rect x="152" y="20" width="96" height="24" rx="8" fill="none" stroke="#64b5f6" stroke-width="2" opacity="0.75"/>
    <circle cx="195" cy="98" r="42" fill="none" stroke="#64b5f6" stroke-width="2" opacity="0.75"/>
    <circle cx="195" cy="98" r="28" fill="#64b5f6" opacity="0.16"/>
    <rect x="275" y="110" width="76" height="58" rx="8" fill="none" stroke="#90caf9" stroke-width="2" opacity="0.8"/>
    <path d="M288,110 L288,100 L315,100 L315,110" fill="none" stroke="#90caf9" stroke-width="2" opacity="0.7"/>
    <line x1="275" y1="138" x2="351" y2="138" stroke="#90caf9" stroke-width="1.5" opacity="0.4"/></g>
</svg>