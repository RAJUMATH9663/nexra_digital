<svg width="400" height="260" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260" role="img" aria-label="Product Videos">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0533"/>
      <stop offset="100%" stop-color="#3d0a6e"/>
    </linearGradient>
    <pattern id="dots" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="1" fill="#ffffff" opacity="0.04"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="400" height="260" fill="url(#bg)"/>
  <rect width="400" height="260" fill="url(#dots)"/>
  <g filter="url(#glow)">
    <rect x="118" y="42" width="105" height="105" rx="10" fill="none" stroke="#e040fb" stroke-width="2.5" opacity="0.9"/>
    <polygon points="118,42 170,15 280,42 228,42" fill="#e040fb" opacity="0.18"/>
    <polygon points="118,42 118,147 170,165 170,62" fill="#b388ff" opacity="0.12"/>
    <text x="130" y="202" font-family="sans-serif" font-size="22" fill="#e040fb" opacity="0.9">★★★★★</text>
    <rect x="272" y="18" width="68" height="50" rx="8" fill="none" stroke="#b388ff" stroke-width="2" opacity="0.75"/>
    <circle cx="306" cy="43" r="13" fill="none" stroke="#b388ff" stroke-width="2" opacity="0.8"/>
    <circle cx="306" cy="43" r="6" fill="#b388ff" opacity="0.3"/></g>
</svg>