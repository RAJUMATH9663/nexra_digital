<svg width="400" height="260" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260" role="img" aria-label="Posters">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#031520"/>
      <stop offset="100%" stop-color="#073d5e"/>
    </linearGradient>
    <pattern id="dots" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="1" fill="#ffffff" opacity="0.04"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="400" height="260" fill="url(#bg)"/>
  <rect width="400" height="260" fill="url(#dots)"/>
  <g filter="url(#glow)">
    <rect x="112" y="12" width="176" height="162" rx="9" fill="none" stroke="#00e5ff" stroke-width="2.5" opacity="0.9"/>
    <rect x="120" y="20" width="160" height="146" rx="6" fill="#00e5ff" opacity="0.08"/>
    <rect x="128" y="38" width="144" height="22" rx="4" fill="#00e5ff" opacity="0.4"/>
    <rect x="136" y="70" width="128" height="12" rx="3" fill="#80deea" opacity="0.28"/>
    <rect x="144" y="90" width="112" height="10" rx="3" fill="#80deea" opacity="0.22"/>
    <text x="200" y="148" font-family="sans-serif" font-size="40" text-anchor="middle" fill="#00e5ff" opacity="0.65">✦</text>
    <rect x="128" y="160" width="144" height="5" rx="2.5" fill="#00e5ff" opacity="0.35"/></g>
</svg>