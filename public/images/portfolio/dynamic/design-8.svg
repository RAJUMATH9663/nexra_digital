<svg width="400" height="260" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260" role="img" aria-label="Menu Cards">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#031520"/>
      <stop offset="100%" stop-color="#073d5e"/>
    </linearGradient>
    <pattern id="dots" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="1" fill="#ffffff" opacity="0.04"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="400" height="260" fill="url(#bg)"/>
  <rect width="400" height="260" fill="url(#dots)"/>
  <g filter="url(#glow)">
    <rect x="128" y="8" width="144" height="168" rx="9" fill="none" stroke="#00e5ff" stroke-width="2.5" opacity="0.9"/>
    <line x1="200" y1="8" x2="200" y2="176" stroke="#00e5ff" stroke-width="1.5" opacity="0.45"/>
    <rect x="136" y="28" width="58" height="10" rx="3" fill="#00e5ff" opacity="0.35"/>
    <rect x="136" y="46" width="52" height="6" rx="2" fill="#80deea" opacity="0.24"/>
    <rect x="136" y="60" width="52" height="6" rx="2" fill="#80deea" opacity="0.24"/>
    <rect x="136" y="74" width="52" height="6" rx="2" fill="#80deea" opacity="0.22"/>
    <rect x="208" y="28" width="56" height="10" rx="3" fill="#00e5ff" opacity="0.35"/>
    <rect x="208" y="46" width="52" height="6" rx="2" fill="#80deea" opacity="0.24"/>
    <rect x="208" y="60" width="52" height="6" rx="2" fill="#80deea" opacity="0.24"/>
    <text x="310" y="110" font-family="sans-serif" font-size="34" fill="#80deea" opacity="0.6">🍽</text></g>
</svg>