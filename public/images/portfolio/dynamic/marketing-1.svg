<svg width="400" height="260" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260" role="img" aria-label="Meta Ads (Facebook &amp; Instagram)">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#051f1b"/>
      <stop offset="100%" stop-color="#0a3d35"/>
    </linearGradient>
    <pattern id="dots" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="1" fill="#ffffff" opacity="0.04"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="400" height="260" fill="url(#bg)"/>
  <rect width="400" height="260" fill="url(#dots)"/>
  <g filter="url(#glow)">
    <rect x="72" y="18" width="256" height="166" rx="14" fill="none" stroke="#00e676" stroke-width="2.5" opacity="0.9"/>
    <rect x="80" y="26" width="240" height="106" rx="9" fill="#00e676" opacity="0.12"/>
    <text x="200" y="88" font-family="sans-serif" font-size="58" text-anchor="middle" fill="#00e676" opacity="0.42">∞</text>
    <line x1="80" y1="140" x2="320" y2="140" stroke="#69f0ae" stroke-width="1.2" opacity="0.35"/>
    <text x="100" y="158" font-family="sans-serif" font-size="15" fill="#00e676" opacity="0.75">👍 Like</text>
    <text x="185" y="158" font-family="sans-serif" font-size="15" fill="#69f0ae" opacity="0.75">💬 Comment</text>
    <rect x="80" y="122" width="78" height="14" rx="4" fill="#00e676" opacity="0.35"/></g>
</svg>