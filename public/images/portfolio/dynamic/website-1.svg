<svg width="400" height="260" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260" role="img" aria-label="Business Websites">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070d1a"/>
      <stop offset="100%" stop-color="#0d2137"/>
    </linearGradient>
    <pattern id="dots" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="1" fill="#ffffff" opacity="0.04"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="400" height="260" fill="url(#bg)"/>
  <rect width="400" height="260" fill="url(#dots)"/>
  <g filter="url(#glow)">
    <rect x="35" y="14" width="330" height="170" rx="13" fill="none" stroke="#448aff" stroke-width="2.5" opacity="0.9"/>
    <rect x="35" y="14" width="330" height="38" rx="13" fill="#448aff" opacity="0.2"/>
    <circle cx="60" cy="25" r="6" fill="#448aff" opacity="0.5"/><circle cx="82" cy="25" r="6" fill="#448aff" opacity="0.5"/><circle cx="104" cy="25" r="6" fill="#448aff" opacity="0.5"/>
    <rect x="128" y="18" width="175" height="18" rx="9" fill="#448aff" opacity="0.22"/>
    <rect x="52" y="68" width="302" height="75" rx="7" fill="#448aff" opacity="0.12"/>
    <rect x="68" y="82" width="110" height="14" rx="3" fill="#448aff" opacity="0.55"/>
    <rect x="68" y="104" width="76" height="9" rx="3" fill="#82b1ff" opacity="0.32"/>
    <rect x="165" y="20" width="32" height="8" rx="2" fill="#fff" opacity="0.32"/><rect x="215" y="20" width="32" height="8" rx="2" fill="#fff" opacity="0.32"/><rect x="265" y="20" width="32" height="8" rx="2" fill="#fff" opacity="0.32"/><rect x="315" y="20" width="32" height="8" rx="2" fill="#fff" opacity="0.32"/></g>
