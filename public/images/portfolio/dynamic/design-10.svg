    <rect x="44" y="132" width="96" height="52" rx="8" fill="none" stroke="#00e5ff" stroke-width="2" opacity="0.65"/>
    <circle cx="92" cy="158" r="17" fill="#00e5ff" opacity="0.3"/>
    <rect x="152" y="138" width="198" height="12" rx="3" fill="#00e5ff" opacity="0.2"/>
