<svg width="400" height="260" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260" role="img" aria-label="Banners">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#031520"/>
      <stop offset="100%" stop-color="#073d5e"/>
    </linearGradient>
    <pattern id="dots" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="1" fill="#ffffff" opacity="0.04"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="400" height="260" fill="url(#bg)"/>
  <rect width="400" height="260" fill="url(#dots)"/>
  <g filter="url(#glow)">
    <rect x="32" y="70" width="336" height="86" rx="12" fill="none" stroke="#00e5ff" stroke-width="2.5" opacity="0.9"/>
    <rect x="40" y="78" width="320" height="70" rx="8" fill="#00e5ff" opacity="0.08"/>
    <rect x="52" y="95" width="190" height="20" rx="4" fill="#00e5ff" opacity="0.4"/>
    <rect x="52" y="124" width="130" height="10" rx="3" fill="#80deea" opacity="0.28"/>
    <rect x="272" y="92" width="78" height="30" rx="8" fill="#00e5ff" opacity="0.6"/>
    <rect x="280" y="100" width="60" height="14" rx="3" fill="#fff" opacity="0.5"/>
    <rect x="55" y="22" width="290" height="36" rx="8" fill="none" stroke="#80deea" stroke-width="1.5" opacity="0.42"/>
    <rect x="55" y="168" width="290" height="36" rx="8" fill="none" stroke="#80deea" stroke-width="1.5" opacity="0.42"/></g>
</svg>